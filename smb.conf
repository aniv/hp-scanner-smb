[global]
   server role = standalone server
   workgroup = WORKGROUP
   security = user
   map to guest = never
   server min protocol = NT1
   server max protocol = SMB3
   smb ports = 445
   disable netbios = yes
   load printers = no
   printing = bsd
   printcap name = /dev/null
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   server string = HP Scanner SMB Server
   ea support = yes
   vfs objects = catia fruit streams_xattr
   fruit:metadata = stream
   fruit:model = MacSamba

[scans]
   path = /srv/scans
   browseable = yes
   read only = no
   guest ok = no
   valid users = scanner
   force user = scanner
   force group = scanner
   create mask = 0660
   directory mask = 0770

